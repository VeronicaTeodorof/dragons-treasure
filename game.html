<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebreaking Game | Play</title>
    <meta name="description" content="Codebreaking Game: can you crack the code in 10 tries? ">

    <!-- Bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 game-body">
    
    <!-- How to play Bootstrap Modal -->
    <!-- Solve problem with aria-hidden warning-->
    <div class="modal fade" id="howToModal" tabindex="-1" aria-labelledby="howToModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content button-modal">
                <!-- Bootstrap border-0 class to remove border between head and body and between body and footer taken form
                 https://stackoverflow.com/questions -->
                <div class="modal-header border-0">
                     <h1 class="modal-title fs-5" id="howToModalLabel">How to Play</h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Instrucions body</p>
                </div>
                 <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Story Modal -->
     <div class="modal fade" id="storyModal" tabindex="-1" aria-labelledby="storyModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content button-modal">
                <div class="modal-header border-0">
                     <h1 class="modal-title text-center" id="storyModalLabel">The Story</h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Drake guards the entrance to the Enchanted Realm where all the dargons' riches lie.</p>
                    <P>Guess the 4 digit key in 10 tries of less, and he'll let you pass.</P>
                    <P>Fail, and...well, better not fail...</P>
                </div>
                 <div class="modal-footer border-0">
                    <button type="button" class="btn modal-button" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Win Bootstrap Modal -->
    <div class="modal fade" id="winModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content button-modal">
                <div class="modal-header">
                     <h1 class="modal-title fs-5" id="howToModalLabel">You Won!</h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Congratulations message.</p>
                </div>
                 <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-secondary">Home</button>
                    <button type="button" class="btn btn-secondary">Play again</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Lose Bootstrap Modal -->
     <div class="modal fade" id="loseModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                     <h1 class="modal-title fs-5" id="howToModalLabel">You Lost!</h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Loosing message</p>
                </div>
                 <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-secondary">Home</button>
                    <button type="button" class="btn btn-secondary">Play again</button>
                </div>
            </div>
        </div>
    </div>
    

        

    <!-- Main -->
    <main>
        <div class="light-overlay">
            <img src="assets/images/dragon-symbol-dark-removebg.webp" alt="metallic serpent dragon" 
            class="dragon-symbol position-absolute start-50 translate-middle-x">
        </div>
        <!-- Feedback section -->
        <section id="feedback" class="feedback">
            <div id="first-column" class="container left-container">
                <!-- Bootstrap class "text-center" found with the help of Claude AI-->
                <div class="row text-center">
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    
                    </div>
                </div>
            </div>
            <div id="second-column" class="container right-container">
                <div class="row text-center">
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span"></span>
                    </div>
                    <div class="guess d-flex justify-content-around large-font">
                        <span class="guess-span visible-text larger-font"></span><span class="feedback-span last"></span>
                    </div>
                </div>
            </div>
        </section>

         <!-- Play section -->
        <section id="play-area">
            <div>
                <form id="guess-form" class="guess-form">
                    <!-- input mode="numeric" makes virtual keyboard dispaly numeric values only;
                     This was needed in order to save space (10 to 20% of screen height) on mobile devices.
                     Code was taken from stackoverflow and suggested by Kevin Loughrey -->
                    <input id="input1" name="input1" type="number" inputmode="numeric" class="input" aria-labelledby="input1"  min="0" max="9" required>
                    <input id="input2" name="input2" type="number" inputmode="numeric" class="input" aria-labelledby="input2"  min="0" max="9" required>
                    <input id="input3" name="input3" type="number" inputmode="numeric" class="input" aria-labelledby="input3"  min="0" max="9" required>
                    <input id="input4" name="input4" type="number" inputmode="numeric" class="input" aria-labelledby="input4"  min="0" max="9" required>
                    <input id="submit" type="submit" value="Try">
                </form>
            </div>
        </section>
    </main>

    <footer class="mt-auto footer">
        <!-- Buttons container -->
        <div class="buttons-container">
            <button class="game-button golden-gradient" id="story" data-bs-toggle="modal" data-bs-target="#storyModal">
                🐉<span class="tooltiptext read-tooltip">Read the story</span>
            </button>
            <button class="game-button golden-gradient" id="instructions" data-bs-toggle="modal" data-bs-target="#howToModal">
                ❓<span class="tooltiptext how-to-tooltip">How to play</span>
            </button>
            <a href="index.html"><button class="game-button golden-gradient" id="return-home">
                🏠<span class="tooltiptext home-tooltip">Home</span>
            </button></a>
        </div>
    </footer>

    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS-->
    <script src="scripts/game.js"></script>
</body>
</html>
